<!-- Login screen -->
<ng-container *ngIf="!user">
  <app-login (loginSuccess)="onLoginSuccess($event)"></app-login>
</ng-container>

<!-- App shell -->
<ng-container *ngIf="user">
  <app-sync-toast [toast]="syncing ? {msg:'Sincronizando dados...', type:'syncing'} : toast"></app-sync-toast>

  <div class="app-shell">
    <app-sidebar
      [user]="user"
      [navItems]="navItems"
      [activePage]="activePage"
      (navigate)="navigateTo($event)"
      (logout)="onLogout()">
    </app-sidebar>

    <div class="main-content">
      <app-header
        [user]="user"
        [isOnline]="isOnline"
        [pendingCount]="pending.length"
        [syncing]="syncing"
        (logout)="onLogout()"
        (syncNow)="onSyncNow()">
      </app-header>

      <main style="flex:1;overflow:auto">
        <app-dashboard *ngIf="activePage==='dashboard'"
          [totals]="totals" [categoryBreakdown]="categoryBreakdown" [memberStats]="memberStats">
        </app-dashboard>
        <app-payment-form *ngIf="activePage==='payment'"
          [user]="user" [transactions]="transactions" (add)="onAdd($event)">
        </app-payment-form>
        <app-donation-form *ngIf="activePage==='donation'"
          [user]="user" (add)="onAdd($event)">
        </app-donation-form>
        <app-expense-form *ngIf="activePage==='expense'"
          (add)="onAdd($event)">
        </app-expense-form>
        <app-history *ngIf="activePage==='history'"
          [transactions]="transactions">
        </app-history>
        <app-transparency *ngIf="activePage==='transparency'"
          [transactions]="transactions" [totals]="totals" [categoryBreakdown]="categoryBreakdown"
          [expensesOnly]="user?.role !== 'manager'">
        </app-transparency>
        <app-transparency *ngIf="activePage==='expenses'"
          [transactions]="transactions" [totals]="totals" [categoryBreakdown]="categoryBreakdown"
          [expensesOnly]="true">
        </app-transparency>
        <app-ai-recommendations *ngIf="activePage==='ai'"></app-ai-recommendations>
        <app-export *ngIf="activePage==='export'"></app-export>
      </main>

      <nav class="mobile-nav">
        <div class="mobile-nav-inner">
          <button *ngFor="let item of navItems.slice(0,5)"
            class="mobile-nav-item" [class.active]="activePage===item.id"
            (click)="navigateTo(item.id)">
            <span style="font-size:1.25rem">{{item.icon}}</span>
            <span>{{item.label}}</span>
          </button>
        </div>
      </nav>
    </div>
  </div>
</ng-container>

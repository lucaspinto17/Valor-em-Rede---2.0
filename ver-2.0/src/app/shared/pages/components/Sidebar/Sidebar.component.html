<aside class="sidebar">
  <div class="sidebar-header">
    <div style="display: flex; align-items: center; gap: 0.5rem">
      <div
        style="
          width: 32px;
          height: 32px;
          border-radius: 50%;
          background: var(--primary);
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        {{ user?.name?.charAt(0)?.toUpperCase() }}
      </div>
      <div>
        <div
          style="
            font-weight: 700;
            font-size: 0.875rem;
            color: var(--text-primary);
          "
        >
          Valor em Rede
        </div>
        <div
          style="
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: capitalize;
          "
        >
          {{ user?.role === "manager" ? "Gestão" : "Membros" }}
        </div>
      </div>
    </div>
  </div>

  <nav style="flex: 1; padding: 0.5rem 0">
    <button
      *ngFor="let item of navItems"
      class="nav-item"
      [class.active]="activePage === item.id"
      (click)="navigate.emit(item.id)"
    >
      <span>{{ item.icon }}</span>
      <span>{{ item.label }}</span>
    </button>
  </nav>

  <div style="padding: 1rem; border-top: 1px solid var(--border)">
    <div
      *ngIf="user"
      style="
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      "
    >
      <div
        style="
          width: 30px;
          height: 30px;
          border-radius: 50%;
          background: var(--primary);
          display: flex;
          align-items: center;
          justify-content: center;
          color: #fff;
          font-weight: 700;
          font-size: 0.75rem;
          flex-shrink: 0;
        "
      >
        {{ user.name?.charAt(0)?.toUpperCase() }}
      </div>
      <div style="flex: 1; min-width: 0">
        <div
          style="
            font-size: 0.8rem;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
          "
        >
          {{ user.name }}
        </div>
        <div
          style="
            font-size: 0.7rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
          "
        >
          {{ user.email }}
        </div>
      </div>
    </div>
    <button
      class="btn btn-ghost"
      style="
        width: 100%;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        justify-content: flex-start;
        padding: 0.4rem 0.5rem;
        font-size: 0.8rem;
        color: var(--text-muted);
      "
      (click)="logout.emit()"
    >
      Sair
    </button>
  </div>
</aside>

<div class="login-bg">
  <div class="login-card">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;background:var(--primary);margin-bottom:.75rem">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      </div>
      <h1 style="font-size:1.5rem;font-weight:700;color:var(--text-primary);margin:0">Valor em Rede</h1>
      <p style="color:var(--text-muted);font-size:.875rem;margin-top:.25rem">Gestão financeira comunitária</p>
    </div>

    <!-- Tabs -->
    <div style="display:flex;background:var(--surface-alt,#f1f5f9);border-radius:10px;padding:3px;margin-bottom:1.25rem">
      <button type="button" (click)="setMode('login')"
        [style.font-weight]="mode==='login'?'700':'400'"
        [style.background]="mode==='login'?'#fff':'transparent'"
        [style.color]="mode==='login'?'var(--primary)':'var(--text-muted)'"
        [style.box-shadow]="mode==='login'?'0 1px 4px rgba(0,0,0,.10)':'none'"
        style="flex:1;padding:.45rem;border-radius:8px;border:none;cursor:pointer;font-size:.875rem;transition:all .15s">
        Entrar
      </button>
      <button type="button" (click)="setMode('register')"
        [style.font-weight]="mode==='register'?'700':'400'"
        [style.background]="mode==='register'?'#fff':'transparent'"
        [style.color]="mode==='register'?'var(--primary)':'var(--text-muted)'"
        [style.box-shadow]="mode==='register'?'0 1px 4px rgba(0,0,0,.10)':'none'"
        style="flex:1;padding:.45rem;border-radius:8px;border:none;cursor:pointer;font-size:.875rem;transition:all .15s">
        Cadastrar
      </button>
    </div>

    <!-- Bloqueio -->
    <div *ngIf="blocked" style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:.75rem;margin-bottom:1rem;text-align:center">
      <p style="color:#dc2626;font-weight:700;margin:0;font-size:.875rem">🔒 Acesso bloqueado temporariamente</p>
      <p style="color:#ef4444;margin:.25rem 0 0;font-size:.8rem">Muitas tentativas incorretas. Aguarde {{countdown}}s.</p>
    </div>

    <form (ngSubmit)="submit()" style="display:flex;flex-direction:column;gap:1rem">

      <!-- Nome (apenas cadastro) -->
      <div *ngIf="mode==='register'">
        <label class="form-label">Nome completo</label>
        <div style="position:relative">
          <input class="form-input" style="padding-left:36px" type="text" placeholder="Seu nome completo"
            [(ngModel)]="name" name="name" />
        </div>
      </div>

      <!-- E-mail -->
      <div>
        <label class="form-label">E-mail</label>
        <div style="position:relative">
          <input class="form-input" type="email" placeholder="seu@email.com"
            [(ngModel)]="email" name="email"
            (ngModelChange)="onEmailChange()"
            [style.border]="emailBorderStyle"
            style="padding-left:36px;padding-right:36px;transition:border .2s"
            [attr.autocomplete]="mode==='login'?'email':'off'" />
        </div>
        <p *ngIf="emailStatus==='taken'" style="font-size:.75rem;color:#ef4444;margin:.25rem 0 0">
          E-mail já cadastrado.
          <button type="button" (click)="setMode('login')" style="color:var(--primary);background:none;border:none;cursor:pointer;font-weight:700;padding:0">Fazer login</button>
        </p>
        <p *ngIf="emailStatus==='ok'&&mode==='register'" style="font-size:.75rem;color:#22c55e;margin:.25rem 0 0">✓ E-mail disponível</p>
      </div>

      <!-- Senha -->
      <div>
        <label class="form-label">Senha</label>
        <div style="position:relative">
          <input class="form-input"
            style="padding-left:36px;padding-right:40px"
            [type]="showPwd?'text':'password'"
            placeholder="••••••"
            [(ngModel)]="password" name="password"
            (ngModelChange)="onPasswordChange()"
            [attr.autocomplete]="mode==='login'?'current-password':'new-password'" />
          <button type="button" (click)="showPwd=!showPwd"
            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:2px">
            <span *ngIf="!showPwd">👁</span>
            <span *ngIf="showPwd">🙈</span>
          </button>
        </div>

        <!-- Barra de força -->
        <div *ngIf="mode==='register'&&password&&pwdStrength" style="margin-top:.4rem">
          <div style="display:flex;gap:3px;margin-bottom:3px">
            <div *ngFor="let i of [1,2,3,4,5]"
              style="flex:1;height:3px;border-radius:99px;transition:background .2s"
              [style.background]="strengthBars(i)"></div>
          </div>
          <p style="font-size:.72rem;margin:0;font-weight:600" [style.color]="pwdStrength.color">{{pwdStrength.label}}</p>
        </div>
      </div>

      <!-- Erro -->
      <p *ngIf="error"
        style="margin:0;padding:.5rem .75rem;border-radius:8px;font-size:.85rem"
        [style.color]="error.startsWith('✉️')?'#059669':'#dc2626'"
        [style.background]="error.startsWith('✉️')?'#d1fae5':'#fef2f2'"
        [style.border-left]="'3px solid '+(error.startsWith('✉️')?'#059669':'#dc2626')">
        {{error}}
      </p>

      <!-- Botão submit -->
      <button class="btn btn-primary" type="submit"
        [disabled]="loading||blocked||(mode==='register'&&emailStatus==='taken')"
        style="width:100%;justify-content:center;gap:.5rem;display:flex;align-items:center">
        <span *ngIf="loading">⏳</span>
        <span *ngIf="!loading&&mode==='login'">🔑</span>
        <span *ngIf="!loading&&mode==='register'">✨</span>
        {{loading?'Aguarde...':(mode==='login'?'Entrar':'Criar conta')}}
      </button>
    </form>

    <!-- Demo -->
    <div *ngIf="!isSupabaseEnabled" style="margin-top:1.25rem;border-top:1px solid var(--border);padding-top:1rem">
      <p style="font-size:.72rem;color:var(--text-muted);text-align:center;margin-bottom:.5rem">Modo demo:</p>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-secondary" style="flex:1;font-size:.75rem" (click)="fillDemo('member')">Membro demo</button>
        <button class="btn btn-secondary" style="flex:1;font-size:.75rem" (click)="fillDemo('manager')">Gestor demo</button>
      </div>
    </div>
  </div>
</div>

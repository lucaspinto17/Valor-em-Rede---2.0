<header class="topbar">
  <div style="display: flex; align-items: center; gap: 0.5rem">
    <h1
      style="
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-primary);
      "
    >
      Valor em Rede
    </h1>
    <span
      style="
        font-size: 0.7rem;
        background: var(--primary-light);
        color: var(--primary);
        padding: 2px 6px;
        border-radius: 99px;
        font-weight: 600;
      "
    >
      {{ user?.role === "manager" ? "Gestão" : "Membros" }}
    </span>
  </div>

  <div style="display: flex; align-items: center; gap: 0.75rem">
    <!-- Online status -->
    <div
      style="
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.75rem;
      "
      [style.color]="isOnline ? '#059669' : '#f59e0b'"
    >
      <div
        style="width: 7px; height: 7px; border-radius: 50%"
        [style.background]="isOnline ? '#059669' : '#f59e0b'"
        [style.animation]="syncing ? 'pulse 1s infinite' : ''"
      ></div>
      <span *ngIf="syncing">Sincronizando...</span>
      <span *ngIf="!syncing && pendingCount > 0" style="color: #f59e0b"
        >{{ pendingCount }} pendente(s)</span
      >
    </div>

    <!-- Sync button -->
    <button
      *ngIf="pendingCount > 0 && !syncing"
      class="btn btn-secondary"
      style="font-size: 0.75rem; padding: 0.3rem 0.6rem"
      (click)="syncNow.emit()"
    >
      Sincronizar
    </button>

    <!-- User -->
    <div *ngIf="user" style="display: flex; align-items: center; gap: 0.4rem">
      <div
        style="
          width: 28px;
          height: 28px;
          border-radius: 50%;
          background: var(--primary);
          display: flex;
          align-items: center;
          justify-content: center;
          color: #fff;
          font-weight: 700;
          font-size: 0.75rem;
        "
      >
        {{ user.name?.charAt(0)?.toUpperCase() }}
      </div>
      <span
        style="
          font-size: 0.8rem;
          font-weight: 600;
          color: var(--text-primary);
          display: none;
          max-width: 120px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        "
        class="show-md"
      >
        {{ user.name }}
      </span>
    </div>

    <button
      class="btn btn-ghost"
      style="
        font-size: 0.8rem;
        padding: 0.3rem 0.6rem;
        color: var(--text-muted);
      "
      (click)="logout.emit()"
    >
      Sair
    </button>
  </div>
</header>

<div class="page">
  <div style="margin-bottom: 1.25rem">
    <h2
      style="
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text-primary);
      "
    >
      Registrar Despesa
    </h2>
    <p style="margin: 0; font-size: 0.85rem; color: var(--text-muted)">
      Gastos e saídas da associação
    </p>
  </div>
  <div class="card" style="max-width: 500px">
    <form
      (ngSubmit)="submit()"
      style="display: flex; flex-direction: column; gap: 1rem"
    >
      <div>
        <label class="form-label">Descrição *</label>
        <input
          class="form-input"
          type="text"
          placeholder="Descreva a despesa"
          [(ngModel)]="form.desc"
          name="desc"
        />
      </div>
      <div>
        <label class="form-label">Categoria</label>
        <select class="form-input" [(ngModel)]="form.category" name="category">
          <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
        </select>
      </div>
      <div>
        <label class="form-label">Valor (R$) *</label>
        <input
          class="form-input"
          type="text"
          placeholder="0,00"
          [value]="maskedValue"
          (input)="onValueInput($event)"
          name="value"
          inputmode="numeric"
        />
      </div>
      <div>
        <label class="form-label">Data</label>
        <input
          class="form-input"
          type="date"
          [(ngModel)]="form.date"
          name="date"
        />
      </div>
      <div>
        <label class="form-label">Responsável</label>
        <input
          class="form-input"
          type="text"
          placeholder="Nome do responsável"
          [(ngModel)]="form.name"
          name="name"
        />
      </div>
      <div>
        <label class="form-label">URL da NF/Comprovante</label>
        <input
          class="form-input"
          type="url"
          placeholder="https://..."
          [(ngModel)]="form.nfUrl"
          name="nfUrl"
        />
      </div>
      <p *ngIf="error" style="color: #dc2626; font-size: 0.85rem; margin: 0">
        {{ error }}
      </p>
      <button
        class="btn btn-primary"
        type="submit"
        [disabled]="loading"
        style="width: 100%; justify-content: center; display: flex"
      >
        {{ loading ? "Salvando..." : "🧾 Registrar Despesa" }}
      </button>
    </form>
  </div>
</div>

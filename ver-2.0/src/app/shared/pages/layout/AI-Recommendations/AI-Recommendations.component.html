<div class="page">
      <div
        style="margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between"
      >
        <div>
          <h2
            style="margin:0;font-size:1.1rem;font-weight:700;color:var(--text-primary)"
          >
            Recomendações feitas pela IA
          </h2>
          <p style="margin:0;font-size:.85rem;color:var(--text-muted)">
            Análise inteligente das finanças
          </p>
        </div>
        <button
          class="btn btn-secondary"
          (click)="fetchRec()"
          [disabled]="loading"
          style="font-size:.8rem"
        >
          {{ loading ? 'Analisando...' : 'Atualizar' }}
        </button>
      </div>

      <div
        *ngIf="loading"
        class="card"
        style="text-align:center;padding:2.5rem"
      >
        <div style="font-size:2rem;margin-bottom:1rem"></div>
        <p style="color:var(--text-muted);font-size:.9rem">
          Analisando suas finanças...
        </p>
      </div>

      <div *ngIf="!loading && recommendations" class="card">
        <div
          style="white-space:pre-wrap;font-size:.875rem;color:var(--text-secondary);line-height:1.7"
        >
          {{ recommendations }}
        </div>
      </div>

      <div
        *ngIf="!loading && !recommendations"
        class="card"
        style="text-align:center;padding:2.5rem"
      >
        <div style="font-size:2.5rem;margin-bottom:1rem"></div>
        <p style="color:var(--text-muted);font-size:.9rem">
          Clique em "Atualizar" para gerar recomendações baseadas nos seus dados
          financeiros.
        </p>
      </div>

      <div *ngIf="error" class="card" style="border-left:3px solid #ef4444">
        <p style="color:#dc2626;font-size:.875rem;margin:0">{{ error }}</p>
      </div>
    </div>

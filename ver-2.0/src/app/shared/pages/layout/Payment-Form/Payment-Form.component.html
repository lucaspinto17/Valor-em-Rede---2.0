<div class="page">
  <div style="margin-bottom: 1.25rem">
    <h2
      style="
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text-primary);
      "
    >
      Registrar Pagamento
    </h2>
    <p style="margin: 0; font-size: 0.85rem; color: var(--text-muted)">
      Mensalidade ou contribuição do membro
    </p>
  </div>

  <div class="card" style="max-width: 500px">
    <form
      (ngSubmit)="submit()"
      style="display: flex; flex-direction: column; gap: 1rem"
    >
      <div>
        <label class="form-label">Nome do membro *</label>
        <input
          class="form-input"
          type="text"
          placeholder="Nome completo"
          [(ngModel)]="form.name"
          name="name"
          required
        />
      </div>
      <div>
        <label class="form-label">Valor (R$) *</label>
        <input
          class="form-input"
          type="text"
          placeholder="0,00"
          [value]="maskedValue"
          (input)="onValueInput($event)"
          name="value"
          inputmode="numeric"
        />
      </div>
      <div>
        <label class="form-label">Referência (mês/ano)</label>
        <input
          class="form-input"
          type="text"
          placeholder="ex: Janeiro 2025"
          [(ngModel)]="form.reference"
          name="reference"
        />
      </div>
      <div>
        <label class="form-label">Data</label>
        <input
          class="form-input"
          type="date"
          [(ngModel)]="form.date"
          name="date"
        />
      </div>
      <div>
        <label class="form-label">Observação</label>
        <textarea
          class="form-input"
          rows="2"
          placeholder="Opcional..."
          [(ngModel)]="form.desc"
          name="desc"
          style="resize: vertical"
        ></textarea>
      </div>
      <p *ngIf="error" style="color: #dc2626; font-size: 0.85rem; margin: 0">
        {{ error }}
      </p>
      <button
        class="btn btn-primary"
        type="submit"
        [disabled]="loading"
        style="width: 100%; justify-content: center; display: flex"
      >
        {{ loading ? "Salvando..." : "💳 Registrar Pagamento" }}
      </button>
    </form>
  </div>

  <!-- Histórico de pagamentos do membro -->
  <div
    *ngIf="memberPayments.length > 0"
    class="card"
    style="max-width: 500px; margin-top: 1rem"
  >
    <h3 style="margin: 0 0 0.75rem; font-size: 0.9rem; font-weight: 600">
      Últimos pagamentos de {{ form.name }}
    </h3>
    <div
      *ngFor="let tx of memberPayments"
      style="
        display: flex;
        justify-content: space-between;
        padding: 0.4rem 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.82rem;
      "
    >
      <span style="color: var(--text-secondary)"
        >{{ tx.date }} — {{ tx.desc || tx.reference || "—" }}</span
      >
      <span style="font-weight: 600; color: #059669">{{
        fmtVal(tx.value)
      }}</span>
    </div>
  </div>
</div>
